{% extends "base.html" %}
{% block title %}Logs{% endblock %}
{% block content %}
<section class="page-header">
  <h1>系统日志</h1>
</section>
<section class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>时间</th><th>级别</th><th>分类</th><th>消息</th><th>详情</th></tr>
      </thead>
      <tbody>
        {% for row in logs %}
        <tr>
          <td>{{ row.created_at }}</td>
          <td>{{ row.level }}</td>
          <td>{{ row.category }}</td>
          <td>{{ row.message }}</td>
          <td>{{ row.detail }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
